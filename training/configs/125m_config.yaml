# Default config for 125M model training on single GPU (Kaggle T4/P100)
# Adjust batch_size and grad_accum_steps to fit your GPU memory.

run_name: "microlm-125m-code-v1"
out_dir: "checkpoints"

# Data
data_path: "data/tokens"
val_shards: 1

# Batch configuration
# Effective tokens/step = batch_size * grad_accum_steps * ctx_len
# T4 (16GB): batch_size=4, grad_accum=16 → 4*16*1024 = 65,536 tok/step
batch_size: 4
ctx_len: 1024
grad_accum_steps: 16

# Optimizer
max_lr: 3.0e-4
min_lr: 3.0e-5
weight_decay: 0.1
grad_clip: 1.0
betas: [0.9, 0.95]

# LR schedule (Chinchilla-inspired)
warmup_steps: 200
total_steps: 50000     # ~3.2B tokens at 65k tok/step

# Logging
log_every: 10
eval_every: 500
save_every: 1000
use_wandb: true
wandb_project: "microlm"

# Memory
use_grad_checkpoint: true
dtype: "bfloat16"
